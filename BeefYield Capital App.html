<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="theme-color" content="#06121F"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>BeefYield Capital — App Inversor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="tokens.css"/>
  <style>
    html, body { margin: 0; padding: 0; background: #0E1117; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
    body { overscroll-behavior: none; }
    #root { width: 100vw; height: 100vh; }
    *::-webkit-scrollbar { width: 0; height: 0; }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    input::placeholder { color: #8497AE; }
    button { font-family: inherit; }
    @media (max-width: 599px) {
      body { background: #F7FAFC; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Shared components and icons (reused from previous prototype) -->
  <script type="text/babel" src="components.jsx"></script>

  <!-- App state, shell, screens -->
  <script type="text/babel" src="byc-state.jsx"></script>
  <script type="text/babel" src="byc-shell.jsx"></script>
  <script type="text/babel" src="byc-auth.jsx"></script>
  <script type="text/babel" src="byc-main.jsx"></script>
  <script type="text/babel" src="byc-invest.jsx"></script>
  <script type="text/babel" src="byc-portfolio.jsx"></script>
  <script type="text/babel" src="byc-extras.jsx"></script>

  <!-- App entry -->
  <script type="text/babel">
    // Register all screens once everything is loaded
    registerScreen('home', HomeScreen);
    registerScreen('opportunities', OpportunitiesScreen);
    registerScreen('my-assets', MyAssetsScreen);
    registerScreen('map', MapScreen);
    registerScreen('agroai', AiScreen);

    registerScreen('opportunity', OpportunityDetailScreen);
    registerScreen('simulator', SimulatorScreen);
    registerScreen('invest', InvestFlowScreen);
    registerScreen('asset', AssetDetailScreen);
    registerScreen('passport', PassportScreen);
    registerScreen('reports', ReportsScreen);
    registerScreen('report-detail', ReportDetailScreen);
    registerScreen('liquidations', LiquidationsScreen);
    registerScreen('club', ClubScreen);
    registerScreen('missions', MissionsScreen);
    registerScreen('profile', ProfileScreen);
    registerScreen('notifications', NotificationsScreen);
    registerScreen('learn', LearnScreen);
    registerScreen('security', SecurityScreen);
    registerScreen('documents', DocumentsScreen);
    registerScreen('settings', SettingsScreen);
    registerScreen('support', SupportScreen);

    function Root() {
      const { state } = useStore();
      let view;
      if (state.view === 'splash') view = <SplashScreen/>;
      else if (state.view === 'login') view = <LoginScreen/>;
      else if (state.view === 'onb') view = <OnboardingScreen/>;
      else if (state.view === 'kyc') view = <KycScreen/>;
      else if (state.view === 'risk') view = <RiskProfileScreen/>;
      else view = <AppRoot/>;

      return (
        <PhoneShell>
          <GlobalAnims/>
          {view}
          <Toast/>
          <Sheet/>
          <Modal/>
          <Drawer/>
        </PhoneShell>
      );
    }

    function AppRoot() {
      const { state } = useStore();
      const top = state.stack[state.stack.length - 1];
      const showFab = ['home', 'opp', 'mine'].includes(state.tab) && !top;
      return (
        <>
          {/* tab root always rendered underneath */}
          <CurrentTabRoot/>
          {/* pushed screens stack on top */}
          {state.stack.map((s, i) => (
            <div key={i + '-' + s.name} style={{ position: 'absolute', inset: 0, background: 'transparent', zIndex: 10 + i }}>
              <ScreenWrap key={i + '-' + s.name}>
                <ScreenByName name={s.name} params={s.params}/>
              </ScreenWrap>
            </div>
          ))}
          {showFab && <AIFab/>}
          {!top && <AppTabBar/>}
        </>
      );
    }

    function App() {
      return (
        <StoreProvider>
          <Root/>
        </StoreProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
